<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>enclose.horse Puzzle Data Exporter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div>
        <div">
            <canvas id="exporter-canvas" style="background: #eeeeee;"></canvas>
    </div>
    <div>
        <div>
            <label for="grid-width">Width</label>
            <input type="number" min=1 max=30 value="20" id="grid-width">
            <label for="grid-height">Height</label>
            <input type="number" min=1 max=30 value="10" id="grid-height">
            <label for="num-walls">Number of walls</label>
            <input type="number" min=1 max=30 value="10" id="num-walls">
        </div>
        <button type="button" id="update-grid-size-btn">Update grid size</button>
        <button type="button" id="clear-grid-btn">Clear grid</button>
        <div>
            <label for="state-string-input">Input state string</label>
            <textarea id="state-string-input"></textarea>
        </div>
        <button type="button" id="import-btn">Import</button>
        <div>
            <label for="state-string-output">Output state string</label>
            <textarea readonly="true" id="state-string-output"></textarea>
        </div>
        <button type="button" id="export-btn">Export</button>
    </div>
    </div>

    <script type="module" src="exporter.js"></script>
</body>

</html>
